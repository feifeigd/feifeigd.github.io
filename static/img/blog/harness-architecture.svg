<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <defs>
    <linearGradient id="gradModel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradComp1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradComp2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradComp3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradComp4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradComp5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradComp6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="620" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Harness 六大组件架构总览</text>

  <!-- System Prompt ring (outer dashed circle) -->
  <ellipse cx="400" cy="320" rx="340" ry="260" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="8,6" opacity="0.3"/>
  <text x="110" y="82" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" font-weight="600" opacity="0.6">System Prompt（贯穿所有组件）</text>

  <!-- Model (center) -->
  <ellipse cx="400" cy="320" rx="72" ry="40" fill="url(#gradModel)" filter="url(#shadowDeep)"/>
  <text x="400" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="white">Model</text>
  <text x="400" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">LLM</text>

  <!-- Component 1: 文件系统 (Top) -->
  <rect x="330" y="100" width="140" height="50" rx="12" fill="url(#gradComp1)" filter="url(#shadow)"/>
  <text x="400" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">📁 文件系统</text>
  <text x="400" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d1fae5">存储 · 版本 · 协作</text>
  <!-- Arrow: Component 1 → Model -->
  <line x1="400" y1="150" x2="400" y2="272" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="400,278 394,268 406,268" fill="#10b981"/>

  <!-- Component 2: Bash+沙箱 (Right) -->
  <rect x="570" y="200" width="140" height="50" rx="12" fill="url(#gradComp2)" filter="url(#shadow)"/>
  <text x="640" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">🖥️ Bash + 沙箱</text>
  <text x="640" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fef3c7">执行 · 隔离 · 验证</text>
  <line x1="555" y1="250" x2="485" y2="290" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="480,293 490,281 492,293" fill="#f59e0b"/>

  <!-- Component 3: AGENTS.md 记忆 (Bottom Right) -->
  <rect x="570" y="390" width="140" height="50" rx="12" fill="url(#gradComp3)" filter="url(#shadow)"/>
  <text x="640" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">🧠 AGENTS.md</text>
  <text x="640" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fecaca">记忆 · 知识注入</text>
  <line x1="555" y1="390" x2="485" y2="348" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="480,345 490,357 488,345" fill="#ef4444"/>

  <!-- Component 4: Web Search+MCP (Bottom) -->
  <rect x="330" y="480" width="140" height="50" rx="12" fill="url(#gradComp4)" filter="url(#shadow)"/>
  <text x="400" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">🌐 Web Search + MCP</text>
  <text x="400" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dbeafe">实时知识 · 外部连接</text>
  <line x1="400" y1="480" x2="400" y2="368" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="400,362 406,372 394,372" fill="#3b82f6"/>

  <!-- Component 5: 上下文工程 (Bottom Left) -->
  <rect x="90" y="390" width="140" height="50" rx="12" fill="url(#gradComp5)" filter="url(#shadow)"/>
  <text x="160" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">🎯 上下文工程</text>
  <text x="160" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ede9fe">对抗 Context Rot</text>
  <line x1="230" y1="390" x2="315" y2="348" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,345 310,357 312,345" fill="#8b5cf6"/>

  <!-- Component 6: 编排+Hooks (Left) -->
  <rect x="90" y="200" width="140" height="50" rx="12" fill="url(#gradComp6)" filter="url(#shadow)"/>
  <text x="160" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white">🔀 编排 + Hooks</text>
  <text x="160" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fce7f3">多 Agent · 质量兜底</text>
  <line x1="230" y1="250" x2="315" y2="290" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,293 310,281 308,293" fill="#ec4899"/>

  <!-- Center labels -->
  <text x="400" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Agent = Model + Harness</text>
  <text x="400" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">模型提供智能，Harness 让智能变得有用</text>

  <!-- Legend -->
  <rect x="25" y="590" width="12" height="12" rx="2" fill="#6366f1" opacity="0.3"/>
  <text x="42" y="601" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">System Prompt 贯穿所有组件</text>
</svg>
