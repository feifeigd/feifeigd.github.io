<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gradBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="35%" stop-color="#7c3aed"/>
      <stop offset="70%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="gradInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gradLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#d8b4fe"/>
    </linearGradient>
  </defs>

  <!-- ====== 外框：六边形 ====== -->
  <path d="M200 16 L368 98 L368 302 L200 384 L32 302 L32 98 Z"
        fill="#1e1b4b" stroke="url(#gradBg)" stroke-width="3"/>

  <!-- 六边形内框 -->
  <path d="M200 32 L352 106 L352 294 L200 368 L48 294 L48 106 Z"
        fill="none" stroke="#4338ca" stroke-width="1.5"/>

  <!-- ====== 终端屏幕区域 ====== -->
  <rect x="52" y="72" width="296" height="216" rx="8" fill="url(#gradInner)" stroke="#4338ca" stroke-width="1.5"/>

  <!-- 终端标题栏 -->
  <rect x="52" y="72" width="296" height="28" rx="8" fill="#312e81"/>
  <rect x="52" y="86" width="296" height="14" fill="#312e81"/>
  <!-- 窗口按钮 -->
  <circle cx="72" cy="86" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="90" cy="86" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="108" cy="86" r="5" fill="#34d399" opacity="0.8"/>
  <!-- 标题文字 -->
  <text x="200" y="91" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="10" fill="#818cf8">
    d7kj@server — bash
  </text>

  <!-- ** 大号终端 Prompt — 这是小尺寸下也可见的核心图案 ** -->
  <!-- Prompt 符号 $ -->
  <text x="80" y="150" font-family="'Courier New', Consolas, monospace" font-size="28" font-weight="bold" fill="#34d399">$</text>

  <!-- "d7kj" 在终端里以命令形式展示 -->
  <text x="110" y="150" font-family="'Courier New', Consolas, monospace" font-size="28" font-weight="bold" fill="#e0e7ff">d7kj</text>

  <!-- 空格 -->
  <!-- 参数 flag -->
  <text x="190" y="150" font-family="'Courier New', Consolas, monospace" font-size="28" font-weight="bold" fill="#fbbf24">--deploy</text>

  <!-- 闪烁光标 — 大尺寸 -->
  <rect x="288" y="124" width="14" height="28" rx="3" fill="#c084fc">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ** 分隔线 ** -->
  <line x1="72" y1="175" x2="328" y2="175" stroke="#2d2a5e" stroke-width="1"/>

  <!-- ** 第二行：命令输出（小号但可读）** -->
  <text x="80" y="208" font-family="'Courier New', Consolas, monospace" font-size="18" fill="#34d399">✓</text>
  <text x="100" y="208" font-family="'Courier New', Consolas, monospace" font-size="18" fill="#34d399">Server</text>
  <text x="172" y="208" font-family="'Courier New', Consolas, monospace" font-size="18" fill="#818cf8">connected</text>
  <text x="280" y="208" font-family="'Courier New', Consolas, monospace" font-size="18" fill="#fbbf24">:8080</text>

  <!-- ** 第三行：第二个 prompt + 小光标 ** -->
  <text x="80" y="248" font-family="'Courier New', Consolas, monospace" font-size="20" fill="#34d399">$</text>
  <text x="100" y="248" font-family="'Courier New', Consolas, monospace" font-size="20" fill="#818cf8">d7kj</text>

  <!-- 小光标 -->
  <rect x="160" y="228" width="10" height="22" rx="2" fill="#c084fc" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- ====== 终端外：电路装饰 ====== -->
  <!-- 左上角电路 -->
  <path d="M48 60 L60 60 L60 72" fill="none" stroke="#6d28d9" stroke-width="2"/>
  <circle cx="48" cy="60" r="3" fill="#7c3aed"/>

  <!-- 右上角电路 -->
  <path d="M352 60 L340 60 L340 72" fill="none" stroke="#6d28d9" stroke-width="2"/>
  <circle cx="352" cy="60" r="3" fill="#7c3aed"/>

  <!-- 底部电路 -->
  <path d="M160 320 L160 340 L140 340 L140 355" fill="none" stroke="#6d28d9" stroke-width="2"/>
  <path d="M240 320 L240 340 L260 340 L260 355" fill="none" stroke="#6d28d9" stroke-width="2"/>
  <circle cx="140" cy="355" r="3" fill="#7c3aed"/>
  <circle cx="260" cy="355" r="3" fill="#7c3aed"/>

  <!-- ====== 状态灯 ====== -->
  <circle cx="340" cy="55" r="3" fill="#34d399">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 底部 d7kj 文字标签（大尺寸补充，小尺寸忽略） -->
  <text x="200" y="370" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="10" fill="#4a4780" letter-spacing="4">d7kj CORE 1.0</text>
</svg>
